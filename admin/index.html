<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Content Manager</title>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>

    <script>
      (function initCMSPreview() {
        function normalizeList(value) {
          if (!value) return [];
          if (Array.isArray(value)) return value.filter(Boolean);
          if (value && typeof value.toJS === 'function') return value.toJS().filter(Boolean);
          return String(value)
            .split(',')
            .map(function (item) { return item.trim(); })
            .filter(Boolean);
        }

        function escapeHtml(value) {
          return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function estimateReadTime(text) {
          var words = String(text || '').trim().split(/\s+/).filter(Boolean).length;
          var minutes = Math.max(1, Math.ceil(words / 200));
          return minutes + ' min read';
        }

        function formatDate(value) {
          if (!value) return '';

          var date = value instanceof Date ? value : new Date(String(value) + 'T00:00:00');
          if (isNaN(date.getTime())) return String(value);

          return date.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
        }

        var md = null;
        try {
          if (window.markdownit) {
            md = window.markdownit({
              html: true,
              linkify: true,
              typographer: true,
              highlight: function (str, lang) {
                if (lang && window.hljs && window.hljs.getLanguage(lang)) {
                  try {
                    return '<pre><code class="hljs language-' + lang + '">' +
                           window.hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                           '</code></pre>';
                  } catch (e) {}
                }
                return '<pre><code class="language-' + lang + '">' +
                       escapeHtml(str) + '</code></pre>';
              }
            });
          }
        } catch (e) {
          console.warn('markdown-it init failed', e);
        }

        function preprocessBody(body) {
          if (!body) return '';
          var lines = String(body).split('\n');
          var result = [];
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (/^\{:\s*.+\}$/.test(line.trim()) && result.length > 0 && result[result.length - 1].trim() !== '') {
              result.push('');
            }
            result.push(line);
          }
          return result.join('\n');
        }

        function renderBodyHtml(body) {
          if (!body) return '';
          if (md) {
            try {
              return md.render(preprocessBody(body));
            } catch (error) {
              console.warn('markdown-it rendering failed', error);
            }
          }
          return escapeHtml(body).replace(/\n/g, '<br>');
        }

        function highlightCodeBlocks(root) {
          if (!window.hljs || typeof window.hljs.highlightElement !== 'function') return;
          root = root || document.querySelector('.cms-post-preview');
          if (!root) return;

          var blocks = root.querySelectorAll('pre code:not(.hljs)');
          for (var i = 0; i < blocks.length; i++) {
            try {
              window.hljs.highlightElement(blocks[i]);
            } catch (error) {
              console.warn('highlightCodeBlocks failed', error);
            }
          }
        }

        function applyKramdownAttrs(root) {
          root = root || document.querySelector('.cms-post-preview') || document;
          try {
            var paras = root.querySelectorAll('.post-content p');
            for (var i = paras.length - 1; i >= 0; i--) {
              var p = paras[i];
              var txt = p.textContent.trim();
              var m = txt.match(/^\{:\s*(.+)\}$/);
              if (m) {
                var classes = m[1].split(/\s+/).map(function (c) { return c.replace(/^\./, ''); }).filter(Boolean).join(' ');
                var prev = p.previousElementSibling;
                if (prev) {
                  prev.className = prev.className ? prev.className + ' ' + classes : classes;
                }
                p.parentNode.removeChild(p);
                continue;
              }
              var innerHtml = p.innerHTML;
              var m2 = innerHtml.match(/\{:\s*([^}]+)\}\s*$/);
              if (m2) {
                var classes2 = m2[1].split(/\s+/).map(function (c) { return c.replace(/^\./, ''); }).filter(Boolean).join(' ');
                var parent = p.parentNode;
                if (parent && parent.className) {
                  parent.className = parent.className + ' ' + classes2;
                } else if (parent) {
                  parent.className = classes2;
                }
                p.innerHTML = innerHtml.replace(/\s*\{:\s*[^}]+\}\s*$/, '').trim();
                if (!p.textContent.trim()) {
                  p.parentNode.removeChild(p);
                }
              }
            }
          } catch (err) {
            console.warn('applyKramdownAttrs failed', err);
          }
        }

        function entryValue(entry, path, fallback) {
          try {
            if (entry && typeof entry.getIn === 'function') {
              var value = entry.getIn(path);
              return value == null ? fallback : value;
            }
            if (entry && entry.data) {
              var data = entry.data;
              for (var i = 0; i < path.length; i += 1) {
                if (data == null) return fallback;
                data = data[path[i]];
              }
              return data == null ? fallback : data;
            }
          } catch (error) {
            return fallback;
          }
          return fallback;
        }

        window.copyCode = function (btn) {
          var container = btn.closest('.code-container');
          if (!container) return;
          var code = container.querySelector('code');
          if (!code) return;
          navigator.clipboard.writeText(code.textContent).then(function () {
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(function () { btn.textContent = orig; }, 2000);
          });
        };

        function ready() {
          if (!window.CMS) return setTimeout(ready, 100);

          var createClass = window.createClass;
          var h = window.h;

          try {
            CMS.registerPreviewStyle('/assets/scss/main.css');
            CMS.registerPreviewStyle('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/idea.min.css');
          } catch (error) {
            console.warn('registerPreviewStyle failed', error);
          }

          if (!createClass || !h) {
            CMS.registerPreviewTemplate('posts', function PostPreviewFallback(props) {
              var entry = props && props.entry;
              var body = entryValue(entry, ['data', 'body'], '');
              return h('div', {
                className: 'post-content',
                dangerouslySetInnerHTML: { __html: renderBodyHtml(body) }
              });
            });
            return;
          }

          var PostPreview = createClass({
              componentDidMount: function componentDidMount() {
                try { applyKramdownAttrs(this.root); } catch (e) { console.warn(e); }
                try { highlightCodeBlocks(this.root); } catch (e) { console.warn(e); }
              },
              componentDidUpdate: function componentDidUpdate() {
                try { applyKramdownAttrs(this.root); } catch (e) { console.warn(e); }
                try { highlightCodeBlocks(this.root); } catch (e) { console.warn(e); }
              },
            render: function render() {
              var entry = this.props.entry;
              var getAsset = this.props.getAsset;

              var title = entryValue(entry, ['data', 'title'], '');
              var subtitle = entryValue(entry, ['data', 'subtitle'], '');
              var date = entryValue(entry, ['data', 'date'], '');
                var background = entryValue(entry, ['data', 'background'], '');
              var body = entryValue(entry, ['data', 'body'], '');
              var tags = normalizeList(entryValue(entry, ['data', 'tags'], []));
              var readTime = estimateReadTime(body);
              var formattedDate = formatDate(date);
              var bodyHtml = renderBodyHtml(body);
              var backgroundAsset = null;

              try {
                backgroundAsset = background && typeof getAsset === 'function' ? getAsset(background) : background;
              } catch (error) {
                backgroundAsset = background;
              }

              var headerProps = { className: 'masthead' };
              if (backgroundAsset) {
                headerProps.style = { backgroundImage: 'url("' + String(backgroundAsset) + '")' };
              }

              return h(
                'div',
                { className: 'cms-post-preview' },
                h(
                  'header',
                  headerProps,
                  h('div', { className: 'overlay' }),
                  h(
                    'div',
                    { className: 'container' },
                    h(
                      'div',
                      { className: 'row' },
                      h(
                        'div',
                        { className: 'col-lg-8 col-md-10 mx-auto' },
                        h(
                          'div',
                          { className: 'post-heading' },
                          h('h1', {}, title),
                          subtitle ? h('h2', { className: 'subheading' }, subtitle) : null,
                          h(
                            'span',
                            { className: 'meta' },
                            'Posted by ',
                            h('a', { href: '/about' }, 'João Nuno Valente'),
                            formattedDate ? h('span', {}, ' on ' + formattedDate + ' · ' + readTime) : null
                          ),
                          tags.length > 0
                            ? h(
                                'div',
                                { className: 'post-tags mt-4' },
                                tags.map(function (tag) {
                                  return h('a', { key: tag, className: 'tag-badge', href: '/posts/?tag=' + encodeURIComponent(tag) }, tag);
                                })
                              )
                            : null
                        )
                      )
                    )
                  )
                ),
                h(
                  'div',
                  { className: 'container' },
                  h(
                    'div',
                    { className: 'row' },
                    h(
                      'div',
                      { className: 'col-lg-8 col-md-10 mx-auto' },
                      h('div', { className: 'post-content', dangerouslySetInnerHTML: { __html: bodyHtml } })
                    )
                  )
                ),
                h('hr', {}),
                h(
                  'footer',
                  {},
                  h(
                    'div',
                    { className: 'container' },
                    h(
                      'div',
                      { className: 'row' },
                      h(
                        'div',
                        { className: 'col-lg-8 col-md-10 mx-auto' },
                        h(
                          'ul',
                          { className: 'list-inline text-center' },
                          h(
                            'li',
                            { className: 'list-inline-item' },
                            h(
                              'a',
                              { href: 'https://joaonunovalente.com', rel: 'noopener noreferrer' },
                              h('span', { className: 'fa-stack fa-lg' }, h('i', { className: 'fas fa-circle fa-stack-2x' }), h('i', { className: 'fas fa-globe fa-stack-1x fa-inverse' }))
                            )
                          ),
                          h(
                            'li',
                            { className: 'list-inline-item' },
                            h(
                              'a',
                              { href: 'https://www.linkedin.com/in/joaonunovalente', rel: 'noopener noreferrer' },
                              h('span', { className: 'fa-stack fa-lg' }, h('i', { className: 'fas fa-circle fa-stack-2x' }), h('i', { className: 'fab fa-linkedin fa-stack-1x fa-inverse' }))
                            )
                          ),
                          h(
                            'li',
                            { className: 'list-inline-item' },
                            h(
                              'a',
                              { href: 'https://github.com/joaonunovalente', rel: 'noopener noreferrer' },
                              h('span', { className: 'fa-stack fa-lg' }, h('i', { className: 'fas fa-circle fa-stack-2x' }), h('i', { className: 'fab fa-github fa-stack-1x fa-inverse' }))
                            )
                          ),
                          h(
                            'li',
                            { className: 'list-inline-item' },
                            h(
                              'a',
                              { href: '/contact' },
                              h('span', { className: 'fa-stack fa-lg' }, h('i', { className: 'fas fa-circle fa-stack-2x' }), h('i', { className: 'far fa-envelope fa-stack-1x fa-inverse' }))
                            )
                          )
                        ),
                        h('p', { className: 'copyright text-muted' }, 'Copyright \u00A9 João Nuno Valente ', new Date().getFullYear())
                      )
                    )
                  )
                )
              );
            }
          });

          CMS.registerPreviewTemplate('posts', PostPreview);
        }

        ready();
      })();
    </script>
  </body>
</html>
